# ----------------------
# General - iTerm2 Optimized
# ----------------------

# Set a custom prefix key (uncomment to use Ctrl-a instead of Ctrl-b)
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

# Set the base index for windows and panes to 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Terminal settings for iTerm2
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Faster command sequences
set -s escape-time 0
set -s focus-events on

# Extended keys for modified key sequences (e.g. Ctrl-Enter, Shift-Enter)
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Disable aggressive-resize for iTerm2 tmux -CC compatibility
setw -g aggressive-resize off

# Increase the history limit
set -g history-limit 50000

# Monitor activity in other windows
setw -g monitor-activity on
set -g visual-activity off

# Prevent tmux from renaming windows automatically
setw -g allow-rename off

# Enable mouse mode
set -g mouse on

# ----------------------
# Movement & Navigation
# ----------------------

# Use vi-style key bindings in copy mode
setw -g mode-keys vi

# Pane movement with vim-style keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim-style keys (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Split windows more intuitively
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window with current path
bind c new-window -c "#{pane_current_path}"

# Quick pane selection
bind -r Tab select-pane -t :.+

# Copy mode enhancements
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# ----------------------
# Status Bar - Dracula Theme
# ----------------------

set -g status-justify "left"
set -g status "on"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-interval 5
set -g status-left-style NONE
set -g status-right-style NONE

# Dracula color scheme
# Palette: bg=#282a36 fg=#f8f8f2 purple=#bd93f9 comment=#6272a4 orange=#ffb86c
set -g status-style bg="#282a36",fg="#f8f8f2"
set -g message-style bg="#bd93f9",fg="#282a36"
set -g message-command-style bg="#bd93f9",fg="#282a36"
set -g pane-border-style fg="#6272a4"
set -g pane-active-border-style fg="#bd93f9"

# Window status colors
setw -g window-status-style fg="#f8f8f2",bg="#282a36"
setw -g window-status-current-style fg="#282a36",bg="#bd93f9",bold
setw -g window-status-activity-style fg="#ffb86c",bg="#282a36",bold

# Status bar content
set -g status-left "#[fg=#282a36,bg=#bd93f9,bold] ⚡ #S #[fg=#bd93f9,bg=#282a36]"
set -g status-right "#[fg=#6272a4,bg=#282a36]#[fg=#f8f8f2,bg=#6272a4] %H:%M #[fg=#bd93f9,bg=#6272a4]#[fg=#282a36,bg=#bd93f9,bold] %d-%b "

# Window status format
setw -g window-status-format " #I #W "
setw -g window-status-current-format "#[fg=#282a36,bg=#bd93f9] #I #W #[fg=#bd93f9,bg=#282a36]"
setw -g window-status-separator ""

# ----------------------
# Red Team Operations
# ----------------------

# -- Logging & Recording --
# Enhanced asciinema recording with toggle functionality (fail-soft when missing)
bind P run-shell 'if ! command -v asciinema >/dev/null 2>&1; then tmux display-message "asciinema not found; install asciinema to enable recording"; exit 0; fi; if tmux display-message -p "#{s/off//:status}" | grep -q "#{pane_id}.*asciinema"; then tmux send-keys C-c; tmux run-shell "sleep 0.5"; tmux display-message "Recording stopped"; else tmux pipe-pane -t "#{pane_id}" "mkdir -p $HOME/Logs && exec asciinema rec $HOME/Logs/tmux-#{session_name}-#{window_index}-#{pane_index}-$(date +%Y%m%d-%H%M%S).cast"; tmux display-message "Recording started"; fi'

# Save pane history to file
bind S run-shell "mkdir -p $HOME/Logs" \; capture-pane -S -10000 \; save-buffer "$HOME/Logs/tmux-history-$(date +%Y%m%d-%H%M%S).txt" \; display-message "History saved to ~/Logs"

# -- Session Management --
# Create a new session with name prompt
bind N command-prompt -p "New session name:" "new-session -s '%%'"

# Switch to the previous and next window
bind p previous-window
bind n next-window

# Quick session switcher (uses fzf if available, otherwise choose-tree)
bind s if-shell 'command -v fzf' \
    'display-popup -E "tmux list-sessions | sed -E '"'"'s/:.*$//'\'' | grep -v \"^$(tmux display-message -p '"'"'#S'"'"')\$\" | fzf --reverse | xargs tmux switch-client -t"' \
    'choose-tree -s'

# -- Red Team Shortcuts --
# aliasr TUI integration (see ~/.config/aliasr/config.toml for config)
bind U split-window "aliasr send -pp"
bind K split-window "aliasr -e send -pp"

# Quick command prompt for common tools
bind C-n command-prompt -p "nmap target:" "new-window 'nmap %%'"
bind C-s new-window -n "http-server" "python3 -m http.server 8080"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ----------------------
# General - iTerm2 Optimized
# ----------------------

# Set a custom prefix key (uncomment to use Ctrl-a instead of Ctrl-b)
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

# Set the base index for windows and panes to 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Terminal settings for iTerm2
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Faster command sequences
set -s escape-time 0
set -s focus-events on

# Extended keys for modified key sequences (e.g. Ctrl-Enter, Shift-Enter)
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Disable aggressive-resize for iTerm2 tmux -CC compatibility
setw -g aggressive-resize off

# Increase the history limit
set -g history-limit 50000

# Monitor activity in other windows
setw -g monitor-activity on
set -g visual-activity off

# Prevent tmux from renaming windows automatically
setw -g allow-rename off

# Enable mouse mode
set -g mouse on

# ----------------------
# Movement & Navigation
# ----------------------

# Use vi-style key bindings in copy mode
setw -g mode-keys vi

# Pane movement with vim-style keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim-style keys (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Split windows more intuitively
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window with current path
bind c new-window -c "#{pane_current_path}"

# Quick pane selection
bind -r Tab select-pane -t :.+

# Copy mode enhancements
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "if command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard -in; elif command -v clip.exe >/dev/null 2>&1; then clip.exe; else tmux load-buffer -; fi"
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# ----------------------
# Status Bar - Neriak Theme
# ----------------------

set -g status-justify "left"
set -g status "on"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-interval 5
set -g status-left-style NONE
set -g status-right-style NONE

# Neriak color scheme (EverQuest dark elf city)
# Palette: bg=#1E1B2E fg=#D4D0E8 purple=#7B6FDE comment=#3D3760 cyan=#00DFFF
set -g status-style bg="#1E1B2E",fg="#D4D0E8"
set -g message-style bg="#7B6FDE",fg="#1E1B2E"
set -g message-command-style bg="#7B6FDE",fg="#1E1B2E"
set -g pane-border-style fg="#3D3760"
set -g pane-active-border-style fg="#00DFFF"

# Window status colors
setw -g window-status-style fg="#D4D0E8",bg="#1E1B2E"
setw -g window-status-current-style fg="#1E1B2E",bg="#7B6FDE",bold
setw -g window-status-activity-style fg="#00DFFF",bg="#1E1B2E",bold

# Status bar content
set -g status-left "#[fg=#1E1B2E,bg=#7B6FDE,bold] ⚡ #S #[fg=#7B6FDE,bg=#1E1B2E]"
set -g status-right "#[fg=#3D3760,bg=#1E1B2E]#[fg=#D4D0E8,bg=#3D3760] %H:%M #[fg=#7B6FDE,bg=#3D3760]#[fg=#1E1B2E,bg=#7B6FDE,bold] %d-%b "

# Window status format
setw -g window-status-format " #I #W "
setw -g window-status-current-format "#[fg=#1E1B2E,bg=#7B6FDE] #I #W #[fg=#7B6FDE,bg=#1E1B2E]"
setw -g window-status-separator ""

# ----------------------
# Operations
# ----------------------

# -- Logging --
# Save pane history to file
bind S run-shell 'mkdir -p "$HOME/Logs" && tmux capture-pane -S -10000 && tmux save-buffer "$HOME/Logs/tmux-history-$(date +%Y%m%d-%H%M%S).txt" && tmux display-message "History saved to ~/Logs"'

# -- Session Management --
# Create a new session with name prompt
bind N command-prompt -p "New session name:" "new-session -s '%%'"

# Switch to the previous and next window
bind p previous-window
bind n next-window

# Quick session switcher
bind s choose-tree -s

# -- Shortcuts --
# aliasr TUI integration (see ~/.config/aliasr/config.toml for config)
bind U split-window "aliasr send -pp"
bind K split-window "aliasr -e send -pp"

# Quick command prompt for common tools
bind C-n command-prompt -p "nmap target:" "new-window 'nmap %%'"
bind C-s new-window -n "http-server" "python3 -m http.server 8080"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
